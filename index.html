<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - SoftGrowTech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Password Generator </h1>
        
        <div class="output-box">
            <input type="text" id="password" readonly placeholder="Click Generate">
            <button id="copyBtn">Copy</button>
        </div>

        <div class="options">
            <label>Password Length: <span id="lengthValue">12</span></label>
            <input type="range" id="length" min="6" max="30" value="12">
            
            <label><input type="checkbox" id="uppercase" checked> Uppercase Letters</label>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
            <label><input type="checkbox" id="symbols"> Symbols</label>
        </div>

        <button id="generateBtn">Generate Password</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
